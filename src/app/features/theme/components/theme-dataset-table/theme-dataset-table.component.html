<label class="h3">{{ 'themeDataset.title' | translate }}</label>
<div class="card mb-3">
  <div class="card-body">
    <app-theme-item-manage
      [headerId]="headerId()"
      [type]="eThemeItemType.DATASET"
      [form]="form"
      [defaultBinding]="defaultBinding()"
      (jsonReset)="jsonReset($event)"
      (afterSave)="layoutStore.loadThemeDatasetItemList()"
      (afterBind)="layoutStore.loadThemeDatasetItemMapList()">
    </app-theme-item-manage>
    <app-form-alerts
      [form]="formArray"
      [formAlerts]="formAlerts()"></app-form-alerts>
    <div class="card mb-3">
      <app-generic-table
        [class.table-invalid]="formArray.invalid"
        [initData]="initData()"
        [formArray]="formArray"
        [createGroup]="createGroup.bind(this)"
        [displayedColumns]="displayedColumns"
        [expandedTmpl]="expandedDetail"
        [cols]="cols()"></app-generic-table>
    </div>
  </div>
</div>

<ng-template #expandedDetail let-element let-index="index">
  <div class="d-flex" [formGroup]="element">
    <div class="column p-1">
      <mat-checkbox
        formControlName="isDefault"
        (change)="changeDefaultKey(index)">
        {{ 'themeDataset.isDefault' | translate }}
      </mat-checkbox>
    </div>
  </div>
</ng-template>
