<div class="card">
  <app-generic-table
    [formArray]="formArray()"
    [initData]="initData()"
    [cols]="cols"
    [displayedColumns]="displayedColumns"
    [createGroup]="createGroup"></app-generic-table>
</div>
<ng-template #expandedTmpl let-element>
  <div class="d-flex flex-column">
    <div class="d-flex input-group my-1 align-items-center">
      <label class="input-group-text">{{
        'dataset.replaceValueMap' | translate
      }}</label>
      @if (element.replaceValueMapName) {
        <label class="input-group-text">{{
          element.replaceValueMapName
        }}</label>
        <button
          class="btn btn-outline-primary d-flex"
          (click)="element.replaceValueMapName = ''">
          <mat-icon>cancel</mat-icon>
        </button>
      }
      <button
        class="btn btn-outline-primary d-flex"
        (click)="selectReplaceValueMap(element)">
        <mat-icon class="material-icons-outlined"
          ><span class="material-symbols-outlined">
            select_window_2
          </span></mat-icon
        >
      </button>
    </div>
  </div>
</ng-template>
<ng-container matColumnDef="expanded">
  <td
    mat-cell
    *matCellDef="let element; let i = dataIndex"
    [attr.colspan]="displayedColumns.length"></td>
</ng-container>
