<div class="d-flex justify-content-between align-items-center">
  <h2 mat-dialog-title>{{ 'spider.settingHeaders' | translate }}</h2>
  <button class="d-flex mx-2" mat-icon-button (click)="onClose()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content>
  <app-headers-table
    [refId]="data.refId"
    [mapType]="data.mapType"></app-headers-table>
</mat-dialog-content>
