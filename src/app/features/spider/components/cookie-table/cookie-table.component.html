<label class="h6">{{ 'scrapy.cookie' | translate }}</label>
<div class="card mb-3">
  <div class="card-body">
    <div class="row g-2 align-items-end mb-2" [formGroup]="form">
      <div>
        <label class="form-label require">{{
          'scrapy.cookieListId' | translate
        }}</label>
        <input
          type="text"
          class="form-control"
          trimOnBlur
          [formControl]="cookieIdControl"
          [class.is-invalid]="
            cookieIdControl.invalid && cookieIdControl.touched
          " />
        @if (cookieIdControl.invalid && cookieIdControl.touched) {
          <div class="invalid-feedback d-block">
            {{
              'msg.blank'
                | translate: { name: ('scrapy.cookieListId' | translate) }
            }}
          </div>
        }
      </div>
      <div>
        <label class="form-label">{{ 'g.description' | translate }}</label>
        <input
          type="text"
          class="form-control"
          trimOnBlur
          [formControl]="descriptionControl" />
      </div>
    </div>

    <div class="d-flex gap-2 justify-content-end my-3">
      @if (!isBinding()) {
        <button
          type="button"
          class="btn btn-outline-primary"
          (click)="openItemSelector()">
          {{ 'g.read' | translate }}
        </button>
      }
      @if (!isEditMode()) {
        <button
          type="button"
          class="btn btn-outline-primary"
          (click)="addItem()"
          [disabled]="!form.valid">
          {{ 'g.add' | translate }}
        </button>
      }
      @if (isEditMode()) {
        <button
          type="button"
          class="btn btn-outline-primary"
          (click)="saveItem()"
          [disabled]="!form.valid">
          {{ 'g.save' | translate }}
        </button>
      }
      @if (showBindButton()) {
        <button
          type="button"
          class="btn btn-outline-primary"
          (click)="toggleBind()">
          {{ (isBinding() ? 'g.unbind' : 'g.bind') | translate }}
        </button>
      }
      @if (!isBinding()) {
        <button type="button" class="btn btn-danger" (click)="onClear()">
          {{ 'g.clear' | translate }}
        </button>
      }
      @if (showDeleteButton()) {
        <button type="button" class="btn btn-danger" (click)="deleteItem()">
          {{ 'g.delete' | translate }}
        </button>
      }
    </div>
    <div class="card mb-3">
      <app-generic-table
        [formArray]="listControl"
        [initData]="list()"
        [createGroup]="createGroup"
        [cols]="cols"
        [displayedColumns]="displayedColumns"></app-generic-table>
    </div>
  </div>
</div>
