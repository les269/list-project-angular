<div class="row g-2 align-items-end mb-2" [formGroup]="manageForm">
  <div>
    <label class="form-label require">{{
      'scrapy.cookieListId' | translate
    }}</label>
    <input
      type="text"
      class="form-control"
      trimOnBlur
      [formControl]="cookieIdControl"
      [class.is-invalid]="cookieIdControl.invalid && cookieIdControl.touched" />
    @if (cookieIdControl.invalid && cookieIdControl.touched) {
      <div class="invalid-feedback d-block">
        {{
          'msg.blank' | translate: { name: ('scrapy.cookieListId' | translate) }
        }}
      </div>
    }
  </div>
  <div>
    <label class="form-label">{{ 'g.description' | translate }}</label>
    <input
      type="text"
      class="form-control"
      trimOnBlur
      [formControl]="descriptionControl" />
  </div>
</div>

<div class="d-flex gap-2 justify-content-end my-3">
  @if (!isBinding()) {
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="openItemSelector()">
      {{ 'g.read' | translate }}
    </button>
  }
  @if (!isEditMode()) {
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="addItem()"
      [disabled]="!manageForm.valid">
      {{ 'g.add' | translate }}
    </button>
  }
  @if (isEditMode()) {
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="saveItem()"
      [disabled]="!manageForm.valid">
      {{ 'g.save' | translate }}
    </button>
  }
  @if (showBindButton()) {
    <button
      type="button"
      class="btn btn-outline-primary"
      (click)="toggleBind()">
      {{ (isBinding() ? 'g.unbind' : 'g.bind') | translate }}
    </button>
  }
  @if (!isBinding()) {
    <button type="button" class="btn btn-danger" (click)="onClear()">
      {{ 'g.clear' | translate }}
    </button>
  }
  @if (showDeleteButton()) {
    <button type="button" class="btn btn-danger" (click)="deleteItem()">
      {{ 'g.delete' | translate }}
    </button>
  }
</div>

<div class="card">
  <app-generic-table
    [formArray]="formArray()"
    [initData]="initData()"
    [createGroup]="createGroup.bind(this)"
    [cols]="cols"
    [displayedColumns]="displayedColumns"></app-generic-table>
</div>
